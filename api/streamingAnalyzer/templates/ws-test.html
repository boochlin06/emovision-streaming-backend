<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>  
window.addEventListener("load", function(evt) {
    var output = document.getElementById("output");
    var input = document.getElementById("input");
    var ws;
    var canvas = document.getElementById("canvas");
    var ctx = canvas.getContext('2d');
    var image  = document.getElementById("img");

    var print = function(message) {
        var d = document.createElement("div");
        d.innerHTML = message;
        output.appendChild(d);
    };
    document.getElementById("open").onclick = function(evt) {
        if (ws) {
            return false;
        }
        var rtspURL="rtsp://admin:emotibot007@192.168.3.250/Streaming/Channels/1";
        
        ws = new WebSocket("ws://192.168.3.11:7080/streaming/video?id=abcdefg&interval=200&url="+encodeURIComponent(rtspURL));
        // ws = new WebSocket("ws://127.0.0.1:5000/websocket");

        ws.onopen = function(evt) {
            print("OPEN");
            ws.send("ack")
        }
        ws.onclose = function(evt) {
            print("CLOSE");
            ws = null;
        }
        ws.onmessage = function(evt) {
            var data = JSON.parse(evt.data)
            console.log(data)
            var that = ws
            image.onload = function() {
                // ctx.drawImage(image, 0, 0, 1920, 1080, 0, 0, 640, 480)
                // that.send("ack")
            };
            image.src = "data:image/jpeg;base64," + data.image_base64
            ws.send("ack")
        }
        ws.onerror = function(evt) {
            print("ERROR: " + evt.data);
        }
        return false;
    };
    document.getElementById("send").onclick = function(evt) {
        if (!ws) {
            return false;
        }
         print("SEND: " + input.value);
        ws.send(input.value);
        return false;
    };
    document.getElementById("close").onclick = function(evt) {
        if (!ws) {
            return false;
        }
        ws.close();
        return false;
    };
});
</script>
</head>
<body>
<table>
<tr><td valign="top" width="50%">
<p>Click "Open" to create a connection to the server, 
"Send" to send a message to the server and "Close" to close the connection. 
You can change the message and send multiple times.
<p>
<form>
<button id="open">Open</button>
<button id="close">Close</button>
<p><input id="input" type="text" value="Hello world!">
<button id="send">Send</button>
</form>
</td><td valign="top" width="50%">
<div id="output"></div>
</td></tr></table>
<img id="img" width="1920" height="1080"></img>
<canvas id="canvas" width="640px" height="480px"></canvas>

</body>
</html>
