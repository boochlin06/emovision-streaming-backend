
# the upstream component nginx needs to connect to
upstream uwsgi {
    server 192.168.3.11:7010;
    server 192.168.3.11:7009;
    server 192.168.3.11:7008;
    server 192.168.3.11:7007;
    server 192.168.3.11:7006;
    server 192.168.3.11:7005;
    server 192.168.3.11:7004;
    server 192.168.3.11:7003;
    server 192.168.3.11:7002;
    server 192.168.3.11:7001;
}
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
# configuration of the server
server {
    # the port your site will be served on
    listen    80;
    # the domain name it will serve for
    # substitute your machine's IP address or FQDN
    # server_name  192.18.3.11;
    charset     utf-8;

    client_max_body_size 75M;   # adjust to taste
    
    location / {
        proxy_pass  http://uwsgi;        
        # include     /etc/nginx/uwsgi_params; # the uwsgi_params file you installed

	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header Host $host;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    }
}