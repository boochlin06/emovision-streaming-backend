upstream uwsgi {
    least_conn;
    server flask_streaming_api_1:5050;
    server flask_streaming_api_2:5050;
    server flask_streaming_api_3:5050;
    server flask_streaming_api_4:5050;
    server flask_streaming_api_5:5050;
    server flask_streaming_api_6:5050;
    server flask_streaming_api_7:5050;
    server flask_streaming_api_8:5050;
    server flask_streaming_api_9:5050;
    server flask_streaming_api_10:5050;
}
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
# configuration of the server
server {
    # the port your site will be served on
    listen    80;
    # the domain name it will serve for
    # substitute your machine's IP address or FQDN
    # server_name  192.18.0.111;
    charset     utf-8;

    client_max_body_size 4G;   # adjust to taste

    location / {
        proxy_pass  http://uwsgi;
	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header Host $host;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        
    }
    location ~\.mp4$ {
        root /files;
        mp4;
        mp4_buffer_size       10m;
        mp4_max_buffer_size   100m;
    }
    location /health {
        return 200 'alive';
        add_header Content-Type text/plain;
    }
}